<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GST Billing Software</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- LOGIN PAGE -->
<div id="page-login" class="page-login">
  <div class="login-box">
    <div class="login-logo">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
    </div>
    <h1>GST Billing</h1>
    <p class="subtitle">Multi-Company Billing Software</p>
    <div class="form-group"><label>Email</label><input type="email" id="login-email" placeholder="admin@yourdomain.com" value="admin@yourdomain.com"></div>
    <div class="form-group"><label>Password</label><input type="password" id="login-pass" placeholder="Password" value="Admin@123"></div>
    <div id="login-error" class="error-msg" style="display:none"></div>
    <button class="btn btn-primary btn-full" onclick="doLogin()">Sign In</button>
  </div>
</div>

<!-- COMPANY SELECT -->
<div id="page-company" class="page page-company hidden">
  <div class="company-select-wrap">
    <h1>Select Company</h1>
    <p id="welcome-name" class="welcome-text"></p>
    <div id="company-list" class="company-grid"></div>
    <button class="btn btn-ghost" onclick="doLogout()" style="margin-top:20px">Sign Out</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="page-app" class="page hidden">
  <!-- Sidebar -->
  <aside id="sidebar">
    <div id="company-badge" class="company-badge"></div>
    <nav>
      <a href="#" class="nav-link active" data-page="dashboard">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="#" class="nav-link" data-page="invoices">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
        Invoices
      </a>
      <a href="#" class="nav-link" data-page="new-invoice">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        New Invoice
      </a>
      <a href="#" class="nav-link" data-page="customers">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        Customers
      </a>
      <a href="#" class="nav-link" data-page="items">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        Items/Services
      </a>
      <a href="#" class="nav-link" data-page="reports">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Reports
      </a>
      <a href="#" class="nav-link" data-page="settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        Settings
      </a>
    </nav>
    <div class="sidebar-bottom">
      <button class="nav-link" onclick="goSelectCompany()" style="width:100%;border:none;background:none;cursor:pointer;text-align:left">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
        Switch Company
      </button>
      <button class="nav-link" onclick="doLogout()" style="width:100%;border:none;background:none;cursor:pointer;text-align:left;color:#e53e3e">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign Out
      </button>
      <div id="user-info" class="user-info"></div>
    </div>
  </aside>

  <!-- Main content -->
  <main id="main-content">
    <div id="content-dashboard" class="content-page"></div>
    <div id="content-invoices" class="content-page hidden"></div>
    <div id="content-new-invoice" class="content-page hidden"></div>
    <div id="content-customers" class="content-page hidden"></div>
    <div id="content-items" class="content-page hidden"></div>
    <div id="content-reports" class="content-page hidden"></div>
    <div id="content-settings" class="content-page hidden"></div>
  </main>
</div>

<!-- MODAL -->
<div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="modal-title">Modal</h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div id="modal-body" class="modal-body"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast-container"></div>

<script src="/js/app.js"></script>
</body>
</html>
